{% extends "base.html" %}

{% block content %}
<h2><i class="fas fa-chart-bar me-2"></i>Analytics Dashboard</h2>

<div class="row g-4">
    <div class="col-md-3">
        <div class="card bg-primary text-white">
            <div class="card-body text-center">
                <h4>{{ total_submissions }}</h4>
                <small>Total Submissions</small>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-success text-white">
            <div class="card-body text-center">
                <h4>{{ low_plagiarism }}</h4>
                <small>Low Similarity</small>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-warning text-white">
            <div class="card-body text-center">
                <h4>{{ medium_plagiarism }}</h4>
                <small>Medium Similarity</small>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-danger text-white">
            <div class="card-body text-center">
                <h4>{{ high_plagiarism }}</h4>
                <small>High Similarity</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
